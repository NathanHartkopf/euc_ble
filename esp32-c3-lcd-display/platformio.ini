[env:esp32-c3-lcd]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

build_flags =
  -DBOARD_WAVESHARE_ESP32_C3_LCD_147

lib_deps =
  moononournation/GFX Library for Arduino @ ^1.5.9
  bitbank2/JPEGDEC @ ^1.8.4

[env:esp32-c6-lcd]
platform = espressif32
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200

build_flags =
  -DBOARD_WAVESHARE_ESP32_C6_LCD_147

lib_deps =
  moononournation/GFX Library for Arduino @ ^1.5.9
  bitbank2/JPEGDEC @ ^1.8.4
