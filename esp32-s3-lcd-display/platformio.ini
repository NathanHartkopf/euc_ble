[env:esp32-s3-lcd]
platform = espressif32@6.9.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

board_build.flash_mode = qio
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB

build_flags =
  -DBOARD_HAS_PSRAM
  -DBOARD_WAVESHARE_ESP32_S3_LCD_147

lib_deps =
  moononournation/GFX Library for Arduino @ 1.5.9
  bitbank2/JPEGDEC @ ^1.8.4

; Legacy targets kept for reference — S3 is the supported receiver platform.
[env:esp32-c3-lcd]
platform = espressif32@6.9.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

build_flags =
  -DBOARD_WAVESHARE_ESP32_C3_LCD_147
  -DUSE_PSRAM_BUFFERS=0
  -DUSE_DUAL_CORE_PIPELINE=0

lib_deps =
  moononournation/GFX Library for Arduino @ 1.5.9
  bitbank2/JPEGDEC @ ^1.8.4

[env:esp32-c6-lcd]
platform = espressif32@6.9.0
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200

build_flags =
  -DBOARD_WAVESHARE_ESP32_C6_LCD_147
  -DUSE_PSRAM_BUFFERS=0
  -DUSE_DUAL_CORE_PIPELINE=0

lib_deps =
  moononournation/GFX Library for Arduino @ 1.5.9
  bitbank2/JPEGDEC @ ^1.8.4
