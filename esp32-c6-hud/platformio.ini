[env:esp32-c6-hud]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200

build_flags =
  -DBOARD_WAVESHARE_ESP32_C6_LCD_147
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_CONF_PATH="${PROJECT_DIR}/include/lv_conf.h"

lib_deps =
  h2zero/NimBLE-Arduino @ ^2.1.0
  lvgl/lvgl @ 8.3.11
  moononournation/GFX Library for Arduino @ ^1.6.6

build_src_filter =
  +<*>
  -<ble_mac.mm>

; Desktop LVGL preview — same hud_ui.cpp, live Nano serial or mock telemetry.
; Requires SDL2: brew install sdl2
[env:hud-sim]
platform = native
build_flags =
  -std=gnu++17
  -Iinclude
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_CONF_PATH="${PROJECT_DIR}/include/lv_conf_sim.h"
  -I/opt/homebrew/include/SDL2
  -I/usr/local/include/SDL2
  -L/opt/homebrew/lib
  -L/usr/local/lib
  -lSDL2
lib_deps =
  lvgl/lvgl @ 8.3.11
build_src_filter =
  -<*>
  +<hud_ui.cpp>
  +<fonts/*.c>
  +<../sim/*.cpp>
